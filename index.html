<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Modern E-Shop</title>
    <link rel="stylesheet" href="style.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200"
      rel="stylesheet"
    />
  </head>
  <body>
    <!-- header -->
    <header>
      <h1>E-Shop</h1>
      <input class="search" type="search" data-i18n="search_placeholder" />
      <div class="filter">
        <span class="material-symbols-outlined" id="bag">shopping_bag</span>
        <span class="material-symbols-outlined" id="heart-filter"
          >favorite</span
        >
        <select class="languages" id="languages">
          <option value="en">English</option>
          <option value="ru">Russian</option>
        </select>
      </div>
    </header>

    <!-- hero entry point-->
    <section class="hero">
      <div class="hero-overlay">
        <div class="hero-content">
          <h1 data-i18n="hero_title"></h1>
          <p data-i18n="hero_desc"></p>
          <button id="hero-btn" data-i18n="hero_btn"></button>
        </div>
      </div>
    </section>

    <!-- cards -->
    <main>
      <div id="product-section" class="cards"></div>
    </main>

    <!-- features -->
    <section class="features">
      <div class="feature-item">
        <span class="material-symbols-outlined">local_shipping</span>
        <div>
          <h3 data-i18n="free_shipping"></h3>
          <p data-i18n="shipping-detail"></p>
        </div>
      </div>
      <div class="feature-item">
        <span class="material-symbols-outlined">shield_with_heart</span>
        <div>
          <h3 data-i18n="secure_payment"></h3>
          <p data-i18n="payment-detail"></p>
        </div>
      </div>
    </section>

    <!-- footer -->
    <footer>
      <p data-i18n="footer_text"></p>
    </footer>

    <!-- bag modal -->
    <div class="modal">
      <div class="modal-content">
        <h2 data-i18n="cart_title"></h2>
        <ul id="cart-list"></ul>
        <div class="cart-footer">
          <h3>€<span id="total-price" data-i18n="total_label"></span></h3>
          <button class="checkout-btn" data-i18n="checkout"></button>
        </div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
